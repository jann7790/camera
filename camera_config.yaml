camera:
  index: 0
  pixel_format: Mono8
exposure:
  mode: manual
  time_us: 5000
gain:
  mode: manual
  value_db: 6
frame_rate:
  enabled: false
  target_fps: 20
white_balance:
  mode: auto
  red_ratio: 1.0
  blue_ratio: 1.0
image:
  gamma: 1.0
  sharpness: null
  saturation: null
  black_level: null
resolution:
  width: 1920
  height: 1200
  offset_x: 0
  offset_y: 0
  binning_vertical: 1
  reverse_x: false
display:
  window_title: FLIR Grasshopper Camera Preview
  show_fps: true
  show_resolution: true
  show_exposure_gain: true
  scale: auto  # 'auto' = 自動適應螢幕, 或設定數字如 0.5, 1.0, 1.5
  fullscreen: false
  flip_horizontal: false  # 水平翻轉（左右翻轉/鏡像）
  flip_vertical: false    # 垂直翻轉（上下翻轉）
save:
  directory: .
  filename_prefix: flir_image
  format: jpg
  jpeg_quality: 95
  add_timestamp: true
  auto_save_interval: 0
analysis:
  brightness_threshold: 180
  auto_analyze_on_save: true
performance:
  image_timeout_ms: 1000
  use_threading: false
  buffer_count: 10
advanced:
  trigger_mode: false
  trigger_source: Software
  enable_roi: false
  roi:
    x: 0
    y: 0
    width: 1920
    height: 1200
debug:
  verbose: false
  show_camera_info: true
  save_log: false
  log_file: camera_debug.log
